<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: gradientFlow 15s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: linear-gradient(to bottom, #ffffff 0%, #f8f9ff 100%);
            width: 100%;
            max-width: 700px;
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(102, 126, 234, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #667eea, #764ba2, #f093fb, #4facfe, #00f2fe);
        }

        .decorative-top {
            font-size: 40px;
            margin-bottom: 15px;
            letter-spacing: 8px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 56px;
            font-weight: 800;
            margin: 15px 0 10px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin: 20px 0 35px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .people-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 30px 0;
        }

        .person {
            background: linear-gradient(135deg, #f5f7ff 0%, #fff4f7 100%);
            padding: 24px;
            border-radius: 20px;
            border: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .person::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .person:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .person:hover::before {
            left: 100%;
        }

        .person::after {
            content: '';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 20px;
            opacity: 0.6;
        }

        .person:nth-child(1)::after { content: '🎂'; }
        .person:nth-child(2)::after { content: '🎉'; }
        .person:nth-child(3)::after { content: '🎈'; }
        .person:nth-child(4)::after { content: '⭐'; }
        .person:nth-child(5)::after { content: '🎊'; }
        .person:nth-child(n+6)::after { content: '🎁'; }

        .name {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin: 0 0 6px 0;
        }

        .department {
            font-size: 14px;
            color: #888;
            margin: 0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 35px;
            font-size: 18px;
            color: #555;
            font-weight: 500;
        }

        .decorative-bottom {
            font-size: 36px;
            margin-top: 20px;
            letter-spacing: 6px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
            }

            h1 {
                font-size: 42px;
            }

            .subtitle {
                font-size: 16px;
            }

            .person {
                padding: 18px;
            }

            .name {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="decorative-top">🎉 🎂 🎈</div>
        <h1>Happy Birthday!</h1>

        <div class="subtitle">
            Celebrating our amazing team members
        </div>

        <div class="people-container">
            {% for person in people %}
            <div class="person">
                <div class="name">{{ person.name }}</div>
                <div class="department">{{ person.department }} Department</div>
            </div>
            {% endfor %}
        </div>

        <div class="footer">
            ✨ Wishing you a day filled with joy, laughter, and celebration ✨
        </div>
        <div class="decorative-bottom">🎊 🎁 🎀</div>
    </div>
</body>
</html>
